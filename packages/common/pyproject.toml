[project]
name = "mcp-stash-common"
version = "0.1.0"
description = "Shared helpers (stdio-safe logging, state paths, keychain secrets, desktop notifications, safe read-only filesystem checks), vendored into mcp-stash plugins via symlink — never installed as its own distribution."
